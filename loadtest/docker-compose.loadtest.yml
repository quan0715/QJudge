# Override for docker-compose.test.yml — adds real celery workers and monitoring
# Usage: docker compose -f docker-compose.test.yml -f loadtest/docker-compose.loadtest.yml up -d --build

services:
  # Override backend-test to use loadtest settings
  backend-test:
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.loadtest
      - OBJECT_STORAGE_ENDPOINT_URL=${LOADTEST_OBJECT_STORAGE_ENDPOINT_URL:?LOADTEST_OBJECT_STORAGE_ENDPOINT_URL is required}
      - OBJECT_STORAGE_PUBLIC_ENDPOINT_URL=${LOADTEST_OBJECT_STORAGE_PUBLIC_ENDPOINT_URL:?LOADTEST_OBJECT_STORAGE_PUBLIC_ENDPOINT_URL is required}
      - OBJECT_STORAGE_ACCESS_KEY=${LOADTEST_OBJECT_STORAGE_ACCESS_KEY:?LOADTEST_OBJECT_STORAGE_ACCESS_KEY is required}
      - OBJECT_STORAGE_SECRET_KEY=${LOADTEST_OBJECT_STORAGE_SECRET_KEY:?LOADTEST_OBJECT_STORAGE_SECRET_KEY is required}
      - OBJECT_STORAGE_REGION=${LOADTEST_OBJECT_STORAGE_REGION:-auto}
      - ANTICHEAT_RAW_BUCKET=${LOADTEST_ANTICHEAT_RAW_BUCKET:?LOADTEST_ANTICHEAT_RAW_BUCKET is required}

  # Override celery-test: real async worker with concurrency
  celery-test:
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.loadtest
      - OBJECT_STORAGE_ENDPOINT_URL=${LOADTEST_OBJECT_STORAGE_ENDPOINT_URL:?LOADTEST_OBJECT_STORAGE_ENDPOINT_URL is required}
      - OBJECT_STORAGE_ACCESS_KEY=${LOADTEST_OBJECT_STORAGE_ACCESS_KEY:?LOADTEST_OBJECT_STORAGE_ACCESS_KEY is required}
      - OBJECT_STORAGE_SECRET_KEY=${LOADTEST_OBJECT_STORAGE_SECRET_KEY:?LOADTEST_OBJECT_STORAGE_SECRET_KEY is required}
      - OBJECT_STORAGE_REGION=${LOADTEST_OBJECT_STORAGE_REGION:-auto}
      - ANTICHEAT_RAW_BUCKET=${LOADTEST_ANTICHEAT_RAW_BUCKET:?LOADTEST_ANTICHEAT_RAW_BUCKET is required}
    command: celery -A config worker -l info -Q celery,default,high_priority --concurrency=4

  # ---- New services ----

  celery-beat-test:
    image: oj_backend_test_img
    container_name: oj_celery_beat_test
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.loadtest
      - POSTGRES_DB=test_oj_e2e
      - POSTGRES_USER=oj_user
      - POSTGRES_PASSWORD=oj_password
      - POSTGRES_HOST=pgbouncer-test
      - POSTGRES_PORT=5432
      - DB_CONN_MAX_AGE=0
      - REDIS_HOST=redis-test
      - REDIS_PORT=6379
      - REDIS_URL=redis://redis-test:6379/0
      - SECRET_KEY=test-secret-key-for-ci-only
    depends_on:
      backend-test:
        condition: service_started
      postgres-test:
        condition: service_healthy
      pgbouncer-test:
        condition: service_healthy
      redis-test:
        condition: service_healthy
    volumes:
      - ./backend:/app
    networks:
      - test-network

  # ---- Monitoring ----

  prometheus:
    image: prom/prometheus:latest
    container_name: oj_prometheus_loadtest
    ports:
      - "9090:9090"
    volumes:
      - ./loadtest/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
    networks:
      - test-network

  grafana:
    image: grafana/grafana:latest
    container_name: oj_grafana_loadtest
    ports:
      - "3001:3000"   # 3001 to avoid conflict with frontend dev
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    volumes:
      - ./loadtest/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - test-network

  postgres_exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: oj_pg_exporter_loadtest
    environment:
      DATA_SOURCE_NAME: "postgresql://oj_user:oj_password@postgres-test:5432/test_oj_e2e?sslmode=disable"
    ports:
      - "9187:9187"
    depends_on:
      postgres-test:
        condition: service_healthy
    networks:
      - test-network

  redis_exporter:
    image: oliver006/redis_exporter:latest
    container_name: oj_redis_exporter_loadtest
    environment:
      REDIS_ADDR: "redis-test:6379"
    ports:
      - "9121:9121"
    depends_on:
      redis-test:
        condition: service_healthy
    networks:
      - test-network

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: oj_cadvisor_loadtest
    ports:
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - test-network
