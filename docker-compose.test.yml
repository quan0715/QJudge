services:
  judge-image-test:
    build:
      context: ./backend/judge
      dockerfile: Dockerfile.judge
    image: oj-judge:latest
    container_name: oj_judge_image_test
    command: ["true"]
    restart: "no"
    networks:
      - test-network

  postgres-test:
    image: postgres:15-alpine
    container_name: oj_postgres_test
    command: postgres -c max_connections=200 -c shared_buffers=256MB -c work_mem=4MB
    environment:
      POSTGRES_DB: test_oj_e2e
      POSTGRES_USER: oj_user
      POSTGRES_PASSWORD: oj_password
    ports:
      - "5433:5432"
    networks:
      - test-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oj_user -d test_oj_e2e"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgbouncer-test:
    image: edoburu/pgbouncer:v1.24.1-p1
    container_name: oj_pgbouncer_test
    environment:
      DB_HOST: postgres-test
      DB_PORT: "5432"
      DB_NAME: "*"
      DB_USER: oj_user
      DB_PASSWORD: oj_password
      AUTH_TYPE: plain
      POOL_MODE: session
      MAX_CLIENT_CONN: "500"
      DEFAULT_POOL_SIZE: "30"
      RESERVE_POOL_SIZE: "15"
      RESERVE_POOL_TIMEOUT: "2"
      MAX_DB_CONNECTIONS: "100"
      QUERY_WAIT_TIMEOUT: "120"
      SERVER_IDLE_TIMEOUT: "600"
      CLIENT_IDLE_TIMEOUT: "0"
      SERVER_RESET_QUERY: "DISCARD ALL"
      IGNORE_STARTUP_PARAMETERS: "extra_float_digits,options"
      LOG_CONNECTIONS: "0"
      LOG_DISCONNECTIONS: "0"
      LOG_STATS: "0"
    ports:
      - "6433:5432"
    networks:
      - test-network
    depends_on:
      postgres-test:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 5432 -U oj_user"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis-test:
    image: redis:7-alpine
    container_name: oj_redis_test
    ports:
      - "6380:6379"
    networks:
      - test-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend-test:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        DJANGO_ENV: development
    container_name: oj_backend_test
    command: >
      sh -c "
        python manage.py migrate &&
        bash /app/scripts/setup_e2e_env.sh &&
        python manage.py runserver 0.0.0.0:8000
      "
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.test
      - POSTGRES_DB=test_oj_e2e
      - POSTGRES_USER=oj_user
      - POSTGRES_PASSWORD=oj_password
      - POSTGRES_HOST=postgres-test
      - POSTGRES_PORT=5432
      - DB_CONN_MAX_AGE=0
      - REDIS_HOST=redis-test
      - REDIS_PORT=6379
      - REDIS_URL=redis://redis-test:6379/0
      - SECRET_KEY=test-secret-key-for-ci-only
      - DEBUG=True
      - ALLOWED_HOSTS=*
    ports:
      - "8002:8000"
    depends_on:
      judge-image-test:
        condition: service_started
      postgres-test:
        condition: service_healthy
      pgbouncer-test:
        condition: service_healthy
      redis-test:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - test-network

  celery-test:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        DJANGO_ENV: development
    container_name: oj_celery_test
    command: celery -A config worker -l info
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.test
      - POSTGRES_DB=test_oj_e2e
      - POSTGRES_USER=oj_user
      - POSTGRES_PASSWORD=oj_password
      - POSTGRES_HOST=postgres-test
      - POSTGRES_PORT=5432
      - DB_CONN_MAX_AGE=0
      - REDIS_HOST=redis-test
      - REDIS_PORT=6379
      - REDIS_URL=redis://redis-test:6379/0
      - SECRET_KEY=test-secret-key-for-ci-only
      - DEBUG=True
      - JUDGE_TMP_DIR=/judge_tmp
    depends_on:
      judge-image-test:
        condition: service_started
      postgres-test:
        condition: service_healthy
      pgbouncer-test:
        condition: service_healthy
      redis-test:
        condition: service_healthy
      backend-test:
        condition: service_started
    volumes:
      - ./backend:/app
      - /var/run/docker.sock:/var/run/docker.sock
      - judge-tmp-test:/judge_tmp
    networks:
      - test-network

  frontend-test:
    build:
      context: ./frontend
      dockerfile: Dockerfile.e2e
    container_name: oj_frontend_test
    command: npm run dev -- --host 0.0.0.0 --port 5174
    environment:
      - VITE_API_TARGET=http://backend-test:8000
    ports:
      - "5174:5174"
    depends_on:
      - backend-test
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - test-network

networks:
  test-network:
    driver: bridge

volumes:
  judge-tmp-test:
