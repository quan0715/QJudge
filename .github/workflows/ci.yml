name: CI

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - "backend/**"
      - "docker-compose.test.yml"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "frontend/**"
      - "backend/**"
      - "docker-compose.test.yml"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================
  # Frontend Unit Tests
  # ============================================
  frontend-unit:
    name: Frontend Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Lint
        run: npm run lint
        working-directory: frontend

      - name: Unit Tests with Coverage
        run: npm run test:coverage
        working-directory: frontend

      - name: Upload Coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage-report
          path: frontend/coverage/
          retention-days: 14

  # ============================================
  # Backend Unit Tests (no Judge)
  # ============================================
  backend-unit:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: test_oj
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    env:
      DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_oj
      REDIS_URL: redis://localhost:6379/0
      DJANGO_SETTINGS_MODULE: config.settings.test
      SECRET_KEY: test-secret-key-for-ci
      JUDGE_ENGINE_ENABLED: "false"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements/dev.txt

      - name: Install dependencies
        run: pip install -r requirements/dev.txt
        working-directory: backend

      - name: Migrate
        run: python manage.py migrate --noinput
        working-directory: backend

      - name: Run Tests
        run: |
          pytest \
            --ignore=apps/judge/ \
            --ignore=apps/submissions/tests/test_performance.py \
            -v --tb=short
        working-directory: backend

      - name: Coverage Report
        if: success()
        run: |
          pytest \
            --ignore=apps/judge/ \
            --ignore=apps/submissions/tests/test_performance.py \
            --cov=apps \
            --cov-config=.coveragerc \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=80 \
            -q
        working-directory: backend

      - name: Upload Coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage-report
          path: backend/coverage.xml
          retention-days: 14

  # ============================================
  # Judge System Tests (needs Docker)
  # ============================================
  judge:
    name: Judge Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: test_oj
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    env:
      DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_oj
      REDIS_URL: redis://localhost:6379/0
      DJANGO_SETTINGS_MODULE: config.settings.test
      SECRET_KEY: test-secret-key-for-ci
      DOCKER_IMAGE_JUDGE: oj-judge:latest
      JUDGE_ENGINE_ENABLED: "true"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements/dev.txt

      - name: Install dependencies
        run: pip install -r requirements/dev.txt
        working-directory: backend

      - name: Build Judge Docker Image
        run: docker build -t oj-judge:latest -f backend/judge/Dockerfile.judge backend/judge

      - name: Verify Judge Image
        run: |
          docker images | grep oj-judge
          docker run --rm oj-judge:latest g++ --version

      - name: Migrate
        run: python manage.py migrate --noinput
        working-directory: backend

      - name: Judge Tests
        run: python manage.py test apps.judge --verbosity=2
        working-directory: backend

      - name: Multi-language Tests
        run: python manage.py test apps.judge.test_multilang --verbosity=2
        working-directory: backend

      - name: Submission Integration Tests
        env:
          PYTEST_ADDOPTS: --no-cov
        run: pytest apps/submissions/tests/test_performance.py -v --tb=short
        working-directory: backend

      - name: Cleanup
        if: always()
        run: docker rmi oj-judge:latest || true
