name: CI

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - "backend/**"
      - "docker-compose.test.yml"
      - ".github/workflows/ci.yml"
      - "scripts/i18n/i18n_check.py"
  pull_request:
    branches: [main, dev]
    paths:
      - "frontend/**"
      - "backend/**"
      - "docker-compose.test.yml"
      - ".github/workflows/ci.yml"
      - "scripts/i18n/i18n_check.py"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ============================================
  # Static Analysis & Build Check (Blocking)
  # ============================================
  static-checks:
    name: Static Analysis & Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Frontend Deps
        run: npm ci
        working-directory: frontend

      - name: i18n Health Check (Reporting)
        run: python3 scripts/i18n/i18n_check.py

      - name: TypeScript Compile Check
        run: npx tsc --noEmit
        working-directory: frontend

      - name: Frontend Build Check (Ensures CD Success)
        run: npm run build
        working-directory: frontend

  # ============================================
  # Frontend Unit Tests
  # ============================================
  frontend-unit:
    name: Frontend Unit Tests
    needs: static-checks
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Lint
        run: npm run lint
        working-directory: frontend

      - name: Unit Tests with Coverage
        run: npm run test:coverage
        working-directory: frontend

      - name: Upload Coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage-report
          path: frontend/coverage/
          retention-days: 14

  # ============================================
  # Frontend API Integration Tests (Docker test stack)
  # ============================================
  frontend-api-integration:
    name: Frontend API Integration Tests
    needs: static-checks
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Show Docker version
        run: |
          docker --version
          docker compose version

      - name: Start test stack
        run: docker compose -f docker-compose.test.yml up -d --build

      - name: Wait for backend readiness
        run: |
          set -euo pipefail
          DC="docker compose -f docker-compose.test.yml"
          for i in $(seq 1 240); do
            # Fail fast if the container has exited
            STATE=$($DC ps --format '{{.State}}' backend-test 2>/dev/null || echo "missing")
            if [ "$STATE" = "exited" ] || [ "$STATE" = "dead" ] || [ "$STATE" = "missing" ]; then
              echo "backend-test container is not running (state=$STATE). Dumping logs:"
              $DC ps
              $DC logs --tail=200 backend-test || true
              exit 1
            fi
            if $DC exec -T backend-test \
              python -c "
          import sys, urllib.error, urllib.request
          try:
              r = urllib.request.urlopen('http://127.0.0.1:8000/api/v1/auth/me', timeout=2)
              print('backend=200'); sys.exit(0)
          except urllib.error.HTTPError as exc:
              print(f'backend={exc.code}'); sys.exit(0)
          except Exception:
              sys.exit(1)
          "; then
              exit 0
            fi
            sleep 2
          done
          echo "Timed out waiting for backend readiness."
          $DC ps
          $DC logs --tail=200 backend-test frontend-test || true
          exit 1

      - name: Run Frontend API Integration Tests
        run: docker compose -f docker-compose.test.yml exec -T frontend-test npm run test:api

      - name: Collect compose logs
        if: always()
        run: docker compose -f docker-compose.test.yml logs --no-color > frontend-api-compose.log

      - name: Upload Frontend API artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-api-integration-artifacts
          path: frontend-api-compose.log
          retention-days: 14

      - name: Cleanup
        if: always()
        run: docker compose -f docker-compose.test.yml down -v

  # ============================================
  # Auth E2E moved to e2e-manual.yml (manual dispatch, parallel groups)
  # ============================================

  # ============================================
  # Backend Unit Tests (no Judge)
  # ============================================
  backend-unit:
    name: Backend Unit Tests
    needs: static-checks
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: test_oj
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    env:
      DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_oj
      REDIS_URL: redis://localhost:6379/0
      DJANGO_SETTINGS_MODULE: config.settings.test
      SECRET_KEY: test-secret-key-for-ci
      JUDGE_ENGINE_ENABLED: "false"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements/dev.txt

      - name: Install dependencies
        run: pip install -r requirements/dev.txt
        working-directory: backend

      - name: Migrate
        run: python manage.py migrate --noinput
        working-directory: backend

      - name: Run Tests
        run: |
          pytest \
            --ignore=apps/judge/ \
            --ignore=apps/submissions/tests/test_performance.py \
            -v --tb=short
        working-directory: backend

      - name: Coverage Report
        if: success()
        run: |
          pytest \
            --ignore=apps/judge/ \
            --ignore=apps/submissions/tests/test_performance.py \
            --cov=apps \
            --cov-config=.coveragerc \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=80 \
            -q
        working-directory: backend

      - name: Upload Coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage-report
          path: backend/coverage.xml
          retention-days: 14

  mcp-server-unit:
    name: MCP Server Tests
    needs: static-checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: mcp-server/pyproject.toml

      - name: Install MCP Server dependencies
        run: pip install "mcp[cli]>=1.9.0" "httpx>=0.27.0" pytest
        working-directory: mcp-server

      - name: Run MCP Server Unit Tests
        env:
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
        run: python -m pytest tests/test_server.py -q
        working-directory: mcp-server

  mcp-server-integration:
    name: MCP Server Integration Tests
    needs: static-checks
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Start test stack
        run: docker compose -f docker-compose.test.yml up -d --build

      - name: Wait for backend readiness
        uses: ./.github/actions/wait-test-stack

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install MCP Server dependencies
        run: pip install "mcp[cli]>=1.9.0" "httpx>=0.27.0" pytest
        working-directory: mcp-server

      - name: Run MCP Integration Tests
        env:
          DJANGO_BASE_URL: http://localhost:8002
          DJANGO_FORWARDED_PROTO: http
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
        run: python -m pytest tests/test_integration.py -v
        working-directory: mcp-server

      - name: Collect compose logs
        if: failure()
        run: docker compose -f docker-compose.test.yml logs --no-color > mcp-integration.log

      - name: Upload artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: mcp-integration-artifacts
          path: mcp-integration.log
          retention-days: 14

      - name: Cleanup
        if: always()
        run: docker compose -f docker-compose.test.yml down -v

  # ============================================
  # Judge System Tests (needs Docker)
  # ============================================
  judge:
    name: Judge Tests
    needs: static-checks
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: test_oj
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    env:
      DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_oj
      REDIS_URL: redis://localhost:6379/0
      DJANGO_SETTINGS_MODULE: config.settings.test
      SECRET_KEY: test-secret-key-for-ci
      DOCKER_IMAGE_JUDGE: oj-judge:latest
      JUDGE_ENGINE_ENABLED: "true"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements/dev.txt

      - name: Install dependencies
        run: pip install -r requirements/dev.txt
        working-directory: backend

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull Judge Image from GHCR
        id: pull-judge
        continue-on-error: true
        run: |
          docker pull ghcr.io/quan0715/qjudge/judge:latest
          docker tag ghcr.io/quan0715/qjudge/judge:latest oj-judge:latest

      - name: Build and push Judge Image (when pull failed or Dockerfile changed)
        if: steps.pull-judge.outcome == 'failure'
        uses: docker/build-push-action@v5
        with:
          context: backend/judge
          file: backend/judge/Dockerfile.judge
          tags: |
            oj-judge:latest
            ghcr.io/quan0715/qjudge/judge:latest
          load: true
          push: true
          cache-from: type=registry,ref=ghcr.io/quan0715/qjudge/judge:buildcache
          cache-to: type=registry,ref=ghcr.io/quan0715/qjudge/judge:buildcache,mode=max

      - name: Verify Judge Image
        run: |
          docker images | grep oj-judge
          docker run --rm oj-judge:latest g++ --version

      - name: Migrate
        run: python manage.py migrate --noinput
        working-directory: backend

      - name: Judge Tests
        run: python manage.py test apps.judge --verbosity=2
        working-directory: backend

      - name: Multi-language Tests
        run: python manage.py test apps.judge.test_multilang --verbosity=2
        working-directory: backend

      - name: Submission Integration Tests
        env:
          PYTEST_ADDOPTS: --no-cov
        run: pytest apps/submissions/tests/test_performance.py -v --tb=short
        working-directory: backend

      - name: Cleanup
        if: always()
        run: docker rmi oj-judge:latest || true
