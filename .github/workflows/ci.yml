name: CI

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - "backend/**"
      - "docker-compose.test.yml"
      - ".github/workflows/ci.yml"
      - "i18n_check.py"
  pull_request:
    branches: [main, dev]
    paths:
      - "frontend/**"
      - "backend/**"
      - "docker-compose.test.yml"
      - ".github/workflows/ci.yml"
      - "i18n_check.py"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ============================================
  # Static Analysis & Build Check (Blocking)
  # ============================================
  static-checks:
    name: Static Analysis & Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Frontend Deps
        run: npm ci
        working-directory: frontend

      - name: i18n Health Check (Reporting)
        run: python3 i18n_check.py

      - name: TypeScript Compile Check
        run: npx tsc --noEmit
        working-directory: frontend

      - name: Frontend Build Check (Ensures CD Success)
        run: npm run build
        working-directory: frontend

  # ============================================
  # Frontend Unit Tests
  # ============================================
  frontend-unit:
    name: Frontend Unit Tests
    needs: static-checks
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Lint
        run: npm run lint
        working-directory: frontend

      - name: Unit Tests with Coverage
        run: npm run test:coverage
        working-directory: frontend

      - name: Upload Coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage-report
          path: frontend/coverage/
          retention-days: 14

  # ============================================
  # Frontend API Integration Tests (Docker test stack)
  # ============================================
  frontend-api-integration:
    name: Frontend API Integration Tests
    needs: static-checks
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Show Docker version
        run: |
          docker --version
          docker compose version

      - name: Start test stack
        run: docker compose -f docker-compose.test.yml up -d --build

      - name: Wait for frontend/backend
        run: |
          set -euo pipefail
          # Backend test container runs migrations + seed setup on boot; allow longer warmup in CI.
          for i in {1..240}; do
            FE_CODE="$(curl -s -o /dev/null -w '%{http_code}' http://localhost:5174 || true)"
            BE_CODE="$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8002/api/v1/auth/me || true)"
            if [[ "$FE_CODE" != "000" && "$BE_CODE" != "000" ]]; then
              echo "frontend=$FE_CODE backend=$BE_CODE"
              exit 0
            fi
            sleep 2
          done
          echo "Timed out waiting for test stack readiness."
          docker compose -f docker-compose.test.yml ps
          exit 1

      - name: Run Frontend API Integration Tests
        run: docker compose -f docker-compose.test.yml exec -T frontend-test npm run test:api

      - name: Collect compose logs
        if: always()
        run: docker compose -f docker-compose.test.yml logs --no-color > frontend-api-compose.log

      - name: Upload Frontend API artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-api-integration-artifacts
          path: frontend-api-compose.log
          retention-days: 14

      - name: Cleanup
        if: always()
        run: docker compose -f docker-compose.test.yml down -v

  # ============================================
  # Backend Unit Tests (no Judge)
  # ============================================
  backend-unit:
    name: Backend Unit Tests
    needs: static-checks
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: test_oj
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    env:
      DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_oj
      REDIS_URL: redis://localhost:6379/0
      DJANGO_SETTINGS_MODULE: config.settings.test
      SECRET_KEY: test-secret-key-for-ci
      JUDGE_ENGINE_ENABLED: "false"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements/dev.txt

      - name: Install dependencies
        run: pip install -r requirements/dev.txt
        working-directory: backend

      - name: Migrate
        run: python manage.py migrate --noinput
        working-directory: backend

      - name: Run Tests
        run: |
          pytest \
            --ignore=apps/judge/ \
            --ignore=apps/submissions/tests/test_performance.py \
            -v --tb=short
        working-directory: backend

      - name: Coverage Report
        if: success()
        run: |
          pytest \
            --ignore=apps/judge/ \
            --ignore=apps/submissions/tests/test_performance.py \
            --cov=apps \
            --cov-config=.coveragerc \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=80 \
            -q
        working-directory: backend

      - name: Upload Coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage-report
          path: backend/coverage.xml
          retention-days: 14

  # ============================================
  # Judge System Tests (needs Docker)
  # ============================================
  judge:
    name: Judge Tests
    needs: static-checks
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: test_oj
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    env:
      DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_oj
      REDIS_URL: redis://localhost:6379/0
      DJANGO_SETTINGS_MODULE: config.settings.test
      SECRET_KEY: test-secret-key-for-ci
      DOCKER_IMAGE_JUDGE: oj-judge:latest
      JUDGE_ENGINE_ENABLED: "true"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements/dev.txt

      - name: Install dependencies
        run: pip install -r requirements/dev.txt
        working-directory: backend

      - name: Build Judge Docker Image
        run: docker build -t oj-judge:latest -f backend/judge/Dockerfile.judge backend/judge

      - name: Verify Judge Image
        run: |
          docker images | grep oj-judge
          docker run --rm oj-judge:latest g++ --version

      - name: Migrate
        run: python manage.py migrate --noinput
        working-directory: backend

      - name: Judge Tests
        run: python manage.py test apps.judge --verbosity=2
        working-directory: backend

      - name: Multi-language Tests
        run: python manage.py test apps.judge.test_multilang --verbosity=2
        working-directory: backend

      - name: Submission Integration Tests
        env:
          PYTEST_ADDOPTS: --no-cov
        run: pytest apps/submissions/tests/test_performance.py -v --tb=short
        working-directory: backend

      - name: Cleanup
        if: always()
        run: docker rmi oj-judge:latest || true
