name: Deploy Documentation

# Deploy standalone documentation to Cloudflare Pages.
# Triggered when documentation-related files are updated on main branch

on:
  push:
    branches: [main]
    paths:
      - "frontend/public/docs/**"
      - "frontend/src/features/docs/**"
      - "frontend/src/i18n/locales/*/docs.json"
      - "frontend/docs.html"
      - "frontend/src/docs-main.tsx"
      - "frontend/vite.config.docs.ts"
      - "frontend/pages/docs-worker.js"
      - "frontend/package.json"
      - "frontend/package-lock.json"
      - ".github/workflows/deploy-docs.yml"
  # Allow manual trigger
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-docs
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: Build and Deploy Documentation
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Validate required secrets
        run: |
          set -euo pipefail
          if [ -z "${CLOUDFLARE_API_TOKEN:-}" ]; then
            echo "Missing required secret: CLOUDFLARE_API_TOKEN" >&2
            exit 1
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Check translations
        run: npm run check:docs
        working-directory: frontend

      - name: Build documentation
        run: npm run build:docs
        working-directory: frontend

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy dist-docs --project-name=qjudge-docs --branch=main
        working-directory: frontend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
