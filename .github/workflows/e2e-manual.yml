# Playwright E2E：僅允許手動觸發。
# 使用方式：GitHub → Actions → 選本 workflow → 「Run workflow」。
# 五組測試平行執行，各自啟動獨立 docker-compose stack。
name: E2E (manual only)

on:
  workflow_dispatch:
    inputs:
      group:
        description: "Test group to run (empty = all groups in parallel)"
        required: false
        default: ""
        type: choice
        options:
          - ""
          - auth
          - exam
          - contest
          - coding
          - settings
      grep:
        description: "Optional grep pattern"
        required: false
        default: ""
        type: string

concurrency:
  group: e2e-manual-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  e2e-auth:
    name: "E2E: Auth & Pending Actions"
    if: inputs.group == '' || inputs.group == 'auth'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Start test stack
        run: |
          docker compose -f docker-compose.test.yml pull --ignore-pull-failures
          docker compose -f docker-compose.test.yml up -d
      - name: Wait for readiness
        uses: ./.github/actions/wait-test-stack
      - name: Run Auth E2E
        run: |
          set -euo pipefail
          SPECS="tests/e2e/auth.e2e.spec.ts tests/e2e/pending-actions-classroom-join.e2e.spec.ts tests/e2e/pending-actions-register-redirect.e2e.spec.ts tests/e2e/pending-actions-exam-takeover.e2e.spec.ts"
          cmd=(npm run test:e2e -- $SPECS)
          if [[ -n "${{ inputs.grep }}" ]]; then cmd+=("--grep" "${{ inputs.grep }}"); fi
          docker compose -f docker-compose.test.yml exec -T -e CI=true -e E2E_REUSE_ENV=true frontend-test "${cmd[@]}"
      - name: Collect logs
        if: always()
        run: docker compose -f docker-compose.test.yml logs --no-color > e2e-auth.log
      - name: Upload artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-auth-artifacts
          path: |
            frontend/playwright-report-e2e
            frontend/test-results
            e2e-auth.log
          retention-days: 14
      - name: Cleanup
        if: always()
        run: docker compose -f docker-compose.test.yml down -v

  e2e-exam:
