name: Integration Tests

# 整合測試（需要完整的 docker-compose.test.yml 環境）
# - Frontend API Integration Tests
# - E2E Tests (Playwright)

on:
  # 手動觸發
  workflow_dispatch:
    inputs:
      test_type:
        description: "Test type to run"
        required: true
        default: "all"
        type: choice
        options:
          - api-only
          - e2e-only
          - all
      debug_enabled:
        description: "Run with debug logging"
        required: false
        default: "false"

  # 自動觸發
  push:
    branches: [main, develop]
    paths:
      - "frontend/src/infrastructure/api/**"
      - "frontend/tests/e2e/**"
      - "backend/apps/**/views.py"
      - "backend/apps/**/serializers.py"
      - "docker-compose.test.yml"
      - ".github/workflows/integration-tests.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "frontend/src/infrastructure/api/**"
      - "frontend/tests/e2e/**"
      - "backend/apps/**/views.py"
      - "backend/apps/**/serializers.py"
      - "docker-compose.test.yml"

jobs:
  # ============================================
  # API Integration Tests
  # ============================================
  api-integration-tests:
    name: API Integration Tests
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.test_type != 'e2e-only'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start Database and Redis
        run: |
          docker compose -f docker-compose.test.yml up -d postgres-test redis-test
          echo "Waiting for database and redis..."
          sleep 10

      - name: Start Backend
        run: |
          docker compose -f docker-compose.test.yml up -d backend-test
          echo "Waiting for backend to start..."

      - name: Wait for Backend Health
        run: |
          for i in {1..60}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8001/api/v1/auth/me || echo "000")
            if [ "$STATUS" -ge "200" ] && [ "$STATUS" -lt "500" ]; then
              echo "✅ Backend is ready! (HTTP $STATUS)"
              exit 0
            fi
            echo "Waiting for backend... ($i/60) - Status: $STATUS"
            sleep 2
          done
          echo "❌ Backend failed to start"
          docker compose -f docker-compose.test.yml logs backend-test
          exit 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        run: npm ci
        working-directory: frontend

      - name: Run API Integration Tests
        env:
          API_BASE_URL: http://localhost:8001
        run: npm run test:api
        working-directory: frontend

      - name: Cleanup Docker Environment
        if: always()
        run: docker compose -f docker-compose.test.yml down -v

  # ============================================
  # E2E Tests (parallel by suite)
  # ============================================
  e2e-tests:
    name: E2E Tests (${{ matrix.suite.name }})
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.test_type != 'api-only'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        suite:
          - name: auth
            spec: tests/e2e/auth.e2e.spec.ts
            allow_failure: false
          - name: problems
            spec: tests/e2e/problems.e2e.spec.ts
            allow_failure: false
          - name: submission
            spec: tests/e2e/submission.e2e.spec.ts
            allow_failure: false
          - name: contest
            spec: tests/e2e/contest.e2e.spec.ts
            allow_failure: true
          - name: api-key
            spec: tests/e2e/api-key.e2e.spec.ts
            allow_failure: false

    # Keep auth/contest failures non-blocking on PR so domain E2E feedback still lands.
    continue-on-error: ${{ matrix.suite.allow_failure || (github.event_name == 'pull_request' && matrix.suite.name == 'auth') }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start Database and Redis
        run: |
          docker compose -f docker-compose.test.yml up -d postgres-test redis-test
          echo "Waiting for database and redis..."
          sleep 10

      - name: Start Backend
        run: |
          docker compose -f docker-compose.test.yml up -d backend-test
          echo "Waiting for backend to start..."

      - name: Wait for Backend Health
        run: |
          for i in {1..60}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8001/api/v1/auth/me || echo "000")
            if [ "$STATUS" -ge "200" ] && [ "$STATUS" -lt "500" ]; then
              echo "✅ Backend is ready! (HTTP $STATUS)"
              exit 0
            fi
            echo "Waiting for backend... ($i/60) - Status: $STATUS"
            sleep 2
          done
          echo "❌ Backend failed to start"
          docker compose -f docker-compose.test.yml logs backend-test
          exit 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        run: npm ci
        working-directory: frontend

      - name: Cache Playwright Browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Select Playwright Browser Set
        id: playwright-target
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "browsers=chromium" >> $GITHUB_OUTPUT
            echo "PR mode: install chromium only"
          else
            echo "browsers=chromium webkit" >> $GITHUB_OUTPUT
            echo "Non-PR mode: install chromium + webkit"
          fi

      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps ${{ steps.playwright-target.outputs.browsers }}
        working-directory: frontend

      - name: Install Playwright Dependencies (if cached)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps ${{ steps.playwright-target.outputs.browsers }}
        working-directory: frontend

      - name: Start Frontend Test Server
        run: |
          docker compose -f docker-compose.test.yml up -d frontend-test
          for i in {1..30}; do
            if curl -sf http://localhost:5174/ > /dev/null 2>&1; then
              echo "✅ Frontend is ready!"
              exit 0
            fi
            echo "Waiting for frontend... ($i/30)"
            sleep 2
          done
          echo "❌ Frontend failed to start"
          docker compose -f docker-compose.test.yml logs frontend-test
          exit 1

      - name: Run E2E Suite
        env:
          E2E_REUSE_ENV: "true"
          CI: "true"
        run: |
          PROJECT_ARG=""
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            PROJECT_ARG="--project=chromium"
            echo "PR mode: run Chromium only for faster and more stable feedback"
          fi

          npx playwright test -c playwright.config.e2e.ts \
            ${{ matrix.suite.spec }} \
            --reporter=html,list \
            $PROJECT_ARG
        working-directory: frontend

      - name: Upload Playwright HTML Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-e2e-${{ matrix.suite.name }}
          path: frontend/playwright-report-e2e/
          retention-days: 30

      - name: Upload Test Results (screenshots, videos, traces)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-test-results-${{ matrix.suite.name }}
          path: frontend/test-results/
          retention-days: 14

      - name: Cleanup Docker Environment
        if: always()
        run: docker compose -f docker-compose.test.yml down -v
