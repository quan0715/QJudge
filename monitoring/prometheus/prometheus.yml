global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: postgres
    static_configs:
      - targets: ['postgres_exporter:9187']

  - job_name: redis
    static_configs:
      - targets: ['redis_exporter:9121']

  - job_name: minio
    metrics_path: /minio/v2/metrics/cluster
    static_configs:
      - targets: ['minio:9000']

  - job_name: cadvisor
    static_configs:
      - targets: ['cadvisor:8080']
