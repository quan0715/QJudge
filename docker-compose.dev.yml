services:
  # Judge Environment Image (built once, used by backend/celery via Docker socket)
  judge-image:
    build:
      context: ./backend/judge
      dockerfile: Dockerfile.judge
    image: oj-judge:latest
    container_name: oj_judge_image_dev
    command: ["true"]
    restart: "no"
    networks:
      - oj_network_dev

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: oj_postgres_dev
    command: postgres -c max_connections=200 -c shared_buffers=256MB -c work_mem=4MB
    environment:
      POSTGRES_DB: ${DB_NAME:-online_judge}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - oj_network_dev
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-online_judge}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  # PgBouncer – connection pooler (session mode, compatible with SELECT FOR UPDATE)
  pgbouncer:
    image: edoburu/pgbouncer:v1.24.1-p1
    container_name: oj_pgbouncer_dev
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-online_judge}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      AUTH_TYPE: plain
      POOL_MODE: session
      MAX_CLIENT_CONN: "200"
      DEFAULT_POOL_SIZE: "30"
      RESERVE_POOL_SIZE: "10"
      RESERVE_POOL_TIMEOUT: "3"
      MAX_DB_CONNECTIONS: "80"
      QUERY_WAIT_TIMEOUT: "120"
      SERVER_IDLE_TIMEOUT: "600"
      CLIENT_IDLE_TIMEOUT: "0"
      SERVER_RESET_QUERY: "DISCARD ALL"
      LOG_CONNECTIONS: "0"
      LOG_DISCONNECTIONS: "0"
      LOG_STATS: "0"
    ports:
      - "6432:5432"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - oj_network_dev
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -h localhost -p 5432 -U ${DB_USER:-postgres}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for Celery
  redis:
    image: redis:7-alpine
    container_name: oj_redis_dev
    command: redis-server --save "" --appendonly no
    ports:
      - "6379:6379"
    networks:
      - oj_network_dev
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # AI Service (LangChain DeepAgent) - Dev Mode
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: oj_ai_service_dev
    command: uvicorn main:app --host 0.0.0.0 --port 8001 --workers 2 --timeout-keep-alive 30
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      - AI_STATE_POSTGRES_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@pgbouncer:5432/${DB_NAME:-online_judge}
      - AI_INTERNAL_TOKEN=${AI_SERVICE_INTERNAL_TOKEN:-dev-ai-internal-token-change-me}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    volumes:
      - ./ai-service:/app
    networks:
      - oj_network_dev
    depends_on:
      pgbouncer:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Django Backend (Dev Mode; shared image with Celery — single build)
  backend:
    build: &backend_dev_build
      context: ./backend
      dockerfile: Dockerfile
      args:
        DJANGO_ENV: development
    image: oj_backend_dev_img
    container_name: oj_backend_dev
    command: python -m uvicorn config.asgi:application --host 0.0.0.0 --port 8000 --reload --reload-dir /app
    volumes:
      - ./backend:/app
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DJANGO_ENV=development
      - DEBUG=True
      - DJANGO_SETTINGS_MODULE=config.settings.dev
      - HOST_PROJECT_ROOT=${HOST_PROJECT_ROOT:-}
      - AI_SERVICE_URL=http://ai-service:8001
      - AI_SERVICE_INTERNAL_TOKEN=${AI_SERVICE_INTERNAL_TOKEN:-dev-ai-internal-token-change-me}
      - DB_HOST=pgbouncer
      - DB_PORT=5432
      - DB_SSLMODE=disable
      - REDIS_URL=redis://redis:6379/0
      - OAUTH_ISSUER_URL=${OAUTH_ISSUER_URL:-http://localhost:8000}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:5173}
      - OBJECT_STORAGE_ENDPOINT_URL=${OBJECT_STORAGE_ENDPOINT_URL:?OBJECT_STORAGE_ENDPOINT_URL is required}
      - OBJECT_STORAGE_PUBLIC_ENDPOINT_URL=${OBJECT_STORAGE_PUBLIC_ENDPOINT_URL:?OBJECT_STORAGE_PUBLIC_ENDPOINT_URL is required}
      - OBJECT_STORAGE_REGION=${OBJECT_STORAGE_REGION:-us-east-1}
      - OBJECT_STORAGE_ACCESS_KEY=${OBJECT_STORAGE_ACCESS_KEY:?OBJECT_STORAGE_ACCESS_KEY is required}
      - OBJECT_STORAGE_SECRET_KEY=${OBJECT_STORAGE_SECRET_KEY:?OBJECT_STORAGE_SECRET_KEY is required}
      - OBJECT_STORAGE_PRESIGNED_URL_TTL_SECONDS=${OBJECT_STORAGE_PRESIGNED_URL_TTL_SECONDS:-300}
      - ANTICHEAT_RAW_BUCKET=${ANTICHEAT_RAW_BUCKET:-anticheat-raw}
      - GLITCHTIP_DSN=${GLITCHTIP_DSN:-}
    depends_on:
      judge-image:
        condition: service_started
      postgres:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    networks:
      - oj_network_dev

  # Celery Worker (Dev Mode)
  celery:
    build: *backend_dev_build
    image: oj_backend_dev_img
    container_name: oj_celery_dev
    command: celery -A config.celery worker --loglevel=info -Q celery,default,high_priority
    volumes:
      - ./backend:/app
      - /var/run/docker.sock:/var/run/docker.sock
      - judge_tmp:/judge_tmp
    env_file:
      - .env
    environment:
      - JUDGE_TMP_DIR=/judge_tmp
      - DJANGO_ENV=development
      - DEBUG=True
      - DJANGO_SETTINGS_MODULE=config.settings.dev
      - HOST_PROJECT_ROOT=${HOST_PROJECT_ROOT:-}
      - DB_HOST=pgbouncer
      - DB_PORT=5432
      - DB_SSLMODE=disable
      - REDIS_URL=redis://redis:6379/0
      - OBJECT_STORAGE_ENDPOINT_URL=${OBJECT_STORAGE_ENDPOINT_URL:?OBJECT_STORAGE_ENDPOINT_URL is required}
      - OBJECT_STORAGE_REGION=${OBJECT_STORAGE_REGION:-us-east-1}
      - OBJECT_STORAGE_ACCESS_KEY=${OBJECT_STORAGE_ACCESS_KEY:?OBJECT_STORAGE_ACCESS_KEY is required}
      - OBJECT_STORAGE_SECRET_KEY=${OBJECT_STORAGE_SECRET_KEY:?OBJECT_STORAGE_SECRET_KEY is required}
      - ANTICHEAT_RAW_BUCKET=${ANTICHEAT_RAW_BUCKET:-anticheat-raw}
    depends_on:
      judge-image:
        condition: service_started
      postgres:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    networks:
      - oj_network_dev

  # Celery Beat (Dev Mode - Scheduler for periodic tasks)
  celery-beat:
    build: *backend_dev_build
    image: oj_backend_dev_img
    container_name: oj_celery_beat_dev
    command: celery -A config beat -l info
    volumes:
      - ./backend:/app
    env_file:
      - .env
    environment:
      - DJANGO_ENV=development
      - DEBUG=True
      - DJANGO_SETTINGS_MODULE=config.settings.dev
      - DB_HOST=pgbouncer
      - DB_PORT=5432
      - DB_SSLMODE=disable
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - oj_network_dev

  # Frontend (Dev Mode with Hot Reload)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: oj_frontend_dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    env_file:
      - .env
    environment:
      - VITE_STORYBOOK_TARGET=http://storybook:6006
      - VITE_MCP_PUBLIC_URL=${VITE_MCP_PUBLIC_URL:-http://localhost:9002/mcp}
    depends_on:
      - backend
      - storybook
    networks:
      - oj_network_dev

  storybook:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: oj_storybook_dev
    command: npm run storybook -- --host 0.0.0.0 --ci
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "6006:6006"
    env_file:
      - .env
    environment:
      - VITE_API_TARGET=http://backend:8000
    depends_on:
      - backend
    networks:
      - oj_network_dev
  # GlitchTip Error Tracking (Dev)
  glitchtip:
    image: glitchtip/glitchtip:latest
    container_name: oj_glitchtip_dev
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/glitchtip
      SECRET_KEY: dev-glitchtip-secret
      REDIS_URL: redis://redis:6379/1
      DEFAULT_FROM_EMAIL: noreply@localhost
      GLITCHTIP_DOMAIN: http://localhost:8080
      ENABLE_ORGANIZATION_CREATION: "true"
    ports:
      - "8080:8000"
    networks:
      - oj_network_dev

  glitchtip-worker:
    image: glitchtip/glitchtip:latest
    container_name: oj_glitchtip_worker_dev
    command: ./bin/run-celery-with-beat.sh
    depends_on:
      - glitchtip
    environment:
      DATABASE_URL: postgres://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/glitchtip
      SECRET_KEY: dev-glitchtip-secret
      REDIS_URL: redis://redis:6379/1
    networks:
      - oj_network_dev

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: oj_cloudflared
    profiles: ["tunnel"]
    restart: always
    command: tunnel --no-autoupdate run --token ${TUNNEL_TOKEN:-}
    networks:
      - oj_network_dev

  qjudge-mcp:
    build:
      context: .
      dockerfile: mcp-server/Dockerfile
    container_name: oj_mcp_dev
    ports:
      - "9002:9000"
    environment:
      - DJANGO_BASE_URL=http://backend:8000
      - MCP_PUBLIC_URL=${MCP_PUBLIC_URL:-http://localhost:9002}
      - OAUTH_ISSUER_URL=${OAUTH_ISSUER_URL:-http://localhost:8000}
    depends_on:
      - backend
    networks:
      - oj_network_dev
    restart: unless-stopped

volumes:
  postgres_data:
  judge_tmp:

networks:
  oj_network_dev:
    driver: bridge
