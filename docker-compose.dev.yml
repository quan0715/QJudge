services:
  # Judge Environment Image (built once, used by backend/celery via Docker socket)
  judge-image:
    build:
      context: ./backend/judge
      dockerfile: Dockerfile.judge
    image: oj-judge:latest
    container_name: oj_judge_image_dev
    command: ["true"]
    restart: "no"
    networks:
      - oj_network_dev

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: oj_postgres_dev
    environment:
      POSTGRES_DB: ${DB_NAME:-online_judge}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - oj_network_dev
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-online_judge}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for Celery
  redis:
    image: redis:7-alpine
    container_name: oj_redis_dev
    ports:
      - "6379:6379"
    networks:
      - oj_network_dev
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: oj_minio_dev
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_API_CORS_ALLOW_ORIGIN: ${MINIO_API_CORS_ALLOW_ORIGIN:-http://localhost:5173}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - oj_network_dev

  # AI Service (LangChain DeepAgent) - Dev Mode
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: oj_ai_service_dev
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      - AI_STATE_POSTGRES_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-online_judge}
      - BACKEND_INTERNAL_URL=http://backend:8000/api/v1/ai
      - AI_SERVICE_ID=${AI_SERVICE_ID:-ai-service-dev}
      - HMAC_SECRET=${HMAC_SECRET:-dev-hmac-secret-change-me}
      - AI_INTERNAL_TOKEN=${AI_SERVICE_INTERNAL_TOKEN:-dev-ai-internal-token-change-me}
      - DEFAULT_MODEL_ID=${DEFAULT_MODEL_ID:-claude-sonnet}
    volumes:
      - ./ai-service:/app
    networks:
      - oj_network_dev
    depends_on:
      - postgres
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Django Backend (Dev Mode)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        DJANGO_ENV: development
    image: oj_backend_dev_img
    container_name: oj_backend_dev
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - HOST_PROJECT_ROOT=${HOST_PROJECT_ROOT}
      - AI_SERVICE_URL=http://ai-service:8001
      - HMAC_SECRET=${HMAC_SECRET:-dev-hmac-secret-change-me}
      - AI_SERVICE_INTERNAL_TOKEN=${AI_SERVICE_INTERNAL_TOKEN:-dev-ai-internal-token-change-me}
      - ANTICHEAT_S3_ENDPOINT_URL=${ANTICHEAT_S3_ENDPOINT_URL:-http://minio:9000}
      - ANTICHEAT_S3_PUBLIC_ENDPOINT_URL=${ANTICHEAT_S3_PUBLIC_ENDPOINT_URL:-}
      - ANTICHEAT_S3_REGION=${ANTICHEAT_S3_REGION:-us-east-1}
      - ANTICHEAT_S3_ACCESS_KEY=${ANTICHEAT_S3_ACCESS_KEY:-minioadmin}
      - ANTICHEAT_S3_SECRET_KEY=${ANTICHEAT_S3_SECRET_KEY:-minioadmin}
      - ANTICHEAT_RAW_BUCKET=${ANTICHEAT_RAW_BUCKET:-anticheat-raw}
      - ANTICHEAT_VIDEO_BUCKET=${ANTICHEAT_VIDEO_BUCKET:-anticheat-videos}
      - ANTICHEAT_PRESIGNED_URL_TTL_SECONDS=${ANTICHEAT_PRESIGNED_URL_TTL_SECONDS:-300}
    depends_on:
      judge-image:
        condition: service_started
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    networks:
      - oj_network_dev

  # Celery Worker (Dev Mode)
  celery:
    image: oj_backend_dev_img
    container_name: oj_celery_dev
    command: celery -A config.celery worker --loglevel=info -Q celery,default,high_priority
    volumes:
      - ./backend:/app
      - /var/run/docker.sock:/var/run/docker.sock
      - judge_tmp:/judge_tmp
    env_file:
      - .env
    environment:
      - JUDGE_TMP_DIR=/judge_tmp
      - HOST_PROJECT_ROOT=${HOST_PROJECT_ROOT}
      - ANTICHEAT_S3_ENDPOINT_URL=${ANTICHEAT_S3_ENDPOINT_URL:-http://minio:9000}
      - ANTICHEAT_S3_REGION=${ANTICHEAT_S3_REGION:-us-east-1}
      - ANTICHEAT_S3_ACCESS_KEY=${ANTICHEAT_S3_ACCESS_KEY:-minioadmin}
      - ANTICHEAT_S3_SECRET_KEY=${ANTICHEAT_S3_SECRET_KEY:-minioadmin}
      - ANTICHEAT_RAW_BUCKET=${ANTICHEAT_RAW_BUCKET:-anticheat-raw}
      - ANTICHEAT_VIDEO_BUCKET=${ANTICHEAT_VIDEO_BUCKET:-anticheat-videos}
    depends_on:
      judge-image:
        condition: service_started
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    networks:
      - oj_network_dev

  celery-video:
    image: oj_backend_dev_img
    container_name: oj_celery_video_dev
    command: celery -A config.celery worker --loglevel=info -Q video_queue --concurrency=2
    volumes:
      - ./backend:/app
      - judge_tmp:/judge_tmp
    env_file:
      - .env
    environment:
      - JUDGE_TMP_DIR=/judge_tmp
      - HOST_PROJECT_ROOT=${HOST_PROJECT_ROOT}
      - ANTICHEAT_S3_ENDPOINT_URL=${ANTICHEAT_S3_ENDPOINT_URL:-http://minio:9000}
      - ANTICHEAT_S3_REGION=${ANTICHEAT_S3_REGION:-us-east-1}
      - ANTICHEAT_S3_ACCESS_KEY=${ANTICHEAT_S3_ACCESS_KEY:-minioadmin}
      - ANTICHEAT_S3_SECRET_KEY=${ANTICHEAT_S3_SECRET_KEY:-minioadmin}
      - ANTICHEAT_RAW_BUCKET=${ANTICHEAT_RAW_BUCKET:-anticheat-raw}
      - ANTICHEAT_VIDEO_BUCKET=${ANTICHEAT_VIDEO_BUCKET:-anticheat-videos}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    networks:
      - oj_network_dev

  # Celery Beat (Dev Mode - Scheduler for periodic tasks)
  celery-beat:
    image: oj_backend_dev_img
    container_name: oj_celery_beat_dev
    command: celery -A config beat -l info
    volumes:
      - ./backend:/app
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - oj_network_dev

  # Frontend (Dev Mode with Hot Reload)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: oj_frontend_dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    env_file:
      - .env
    depends_on:
      - backend
    networks:
      - oj_network_dev
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: oj_cloudflared
    restart: always
    command: tunnel --no-autoupdate run --token ${TUNNEL_TOKEN}
    networks:
      - oj_network_dev

volumes:
  postgres_data:
  redis_data:
  judge_tmp:
  minio_data:

networks:
  oj_network_dev:
    driver: bridge
