openapi: 3.0.3
info:
  title: Online Judge API
  version: 1.0.0
  description: API documentation for Online Judge Platform
paths:
  /api/v1/ai/internal/code/run:
    post:
      operationId: v1_ai_internal_code_run_create
      description: |-
        POST /api/v1/ai/internal/code/run

        Execute code against test cases in a sandbox.
        Returns per-case results and a summary.
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CodeRunRequestRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CodeRunRequestRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CodeRunRequestRequest'
        required: true
      security:
      - cookieJwtAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CodeRunRequest'
          description: ''
  /api/v1/ai/internal/pending-actions/{action_id}:
    get:
      operationId: v1_ai_internal_pending_actions_retrieve
      description: |-
        GET /api/v1/ai/internal/pending-actions/{action_id}

        Returns pending action details (for ai-service to build approval preview).
      parameters:
      - in: path
        name: action_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - v1
      security:
      - cookieJwtAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PendingAction'
          description: ''
  /api/v1/ai/internal/problem-actions/commit:
    post:
      operationId: v1_ai_internal_problem_actions_commit_create
      description: |-
        POST /api/v1/ai/internal/problem-actions/commit

        Called by ai-service tool after user confirms.
        Executes the actual create/patch with transaction safety.
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommitActionRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CommitActionRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CommitActionRequest'
        required: true
      security:
      - cookieJwtAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommitAction'
          description: ''
  /api/v1/ai/internal/problem-actions/prepare:
    post:
      operationId: v1_ai_internal_problem_actions_prepare_create
      description: |-
        POST /api/v1/ai/internal/problem-actions/prepare

        Called by ai-service tool: creates AIPendingAction with preview.
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PrepareActionRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PrepareActionRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PrepareActionRequest'
        required: true
      security:
      - cookieJwtAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrepareAction'
          description: ''
  /api/v1/ai/internal/problems/{problem_id}/context:
    get:
      operationId: v1_ai_internal_problems_context_retrieve
      description: |-
        GET /api/v1/ai/internal/problems/{id}/context

        Returns problem data for agent to read.
      parameters:
      - in: path
        name: problem_id
        schema:
          type: string
          format: uuid
