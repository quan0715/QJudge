components:
  schemas:
    AIMessage:
      type: object
      description: Serializer for AI messages.
      properties:
        id:
          type: integer
          readOnly: true
        role:
          allOf:
          - $ref: '#/components/schemas/AIMessageRoleEnum'
          title: 角色
        content:
          type: string
          title: 訊息內容
        message_type:
          allOf:
          - $ref: '#/components/schemas/MessageTypeEnum'
          title: 訊息類型
        metadata:
          title: 元資料
          description: 存儲選項、預覽資料等額外資訊
        created_at:
          type: string
          format: date-time
          readOnly: true
          title: 創建時間
      required:
      - content
      - created_at
      - id
      - role
    AIMessageRequest:
      type: object
      description: Serializer for AI messages.
      properties:
        role:
          allOf:
          - $ref: '#/components/schemas/AIMessageRoleEnum'
          title: 角色
        content:
          type: string
          minLength: 1
          title: 訊息內容
        message_type:
          allOf:
          - $ref: '#/components/schemas/MessageTypeEnum'
          title: 訊息類型
        metadata:
          title: 元資料
          description: 存儲選項、預覽資料等額外資訊
      required:
      - content
      - role
    AIMessageRoleEnum:
      enum:
      - user
      - assistant
      - system
      type: string
      description: |-
        * `user` - 用戶
        * `assistant` - AI 助手
        * `system` - 系統
    AISession:
      type: object
      description: Serializer for AI sessions.
      properties:
        session_id:
          type: string
          readOnly: true
          title: Claude SDK Session ID
          description: 由 Claude Agent SDK 返回的唯一會話 ID
        user:
          type: integer
          readOnly: true
          title: 用戶
          description: 該會話所屬的用戶
        context:
          title: 上下文資料
          description: 存儲額外的會話元數據（如標題、自定義數據等）
        created_at:
          type: string
          format: date-time
          readOnly: true
          title: 創建時間
        updated_at:
          type: string
          format: date-time
          readOnly: true
          title: 更新時間
        messages:
          type: array
          items:
            $ref: '#/components/schemas/AIMessage'
          readOnly: true
        message_count:
          type: string
          readOnly: true
        title:
          type: string
          readOnly: true
      required:
      - created_at
      - message_count
      - messages
      - session_id
      - title
      - updated_at
      - user
    AISessionList:
      type: object
      description: Lightweight serializer for session list.
      properties:
        session_id:
          type: string
          title: Claude SDK Session ID
          description: 由 Claude Agent SDK 返回的唯一會話 ID
          maxLength: 36
        user:
          type: integer
          title: 用戶
          description: 該會話所屬的用戶
        created_at:
          type: string
          format: date-time
          readOnly: true
          title: 創建時間
        updated_at:
          type: string
          format: date-time
          readOnly: true
          title: 更新時間
        message_count:
          type: string
          readOnly: true
        title:
          type: string
          readOnly: true
      required:
      - created_at
      - message_count
      - session_id
      - title
      - updated_at
      - user
    AISessionRequest:
      type: object
      description: Serializer for AI sessions.
      properties:
        context:
          title: 上下文資料
          description: 存儲額外的會話元數據（如標題、自定義數據等）
    ActionEnum:
      enum:
      - takeover_lock
      type: string
      description: '* `takeover_lock` - takeover_lock'
    Announcement:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        title:
          type: string
          maxLength: 255
        content:
          type: string
        author:
          allOf:
          - $ref: '#/components/schemas/User'
          readOnly: true
        visible:
          type: boolean
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - author
      - content
      - created_at
      - id
      - title
      - updated_at
    AnnouncementRequest:
      type: object
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 255
        content:
          type: string
          minLength: 1
        visible:
          type: boolean
      required:
      - content
      - title
    AuthProviderEnum:
      enum:
      - email
      - nycu-oauth
      - google
      - github
      type: string
      description: |-
        * `email` - Email/Password
        * `nycu-oauth` - NYCU OAuth
        * `google` - Google
        * `github` - GitHub
    CategoryEnum:
      enum:
      - coding
      - exam
      type: string
      description: |-
        * `coding` - Coding
        * `exam` - Exam
    ChangePasswordRequest:
      type: object
      description: Serializer for changing password.
      properties:
        current_password:
          type: string
          writeOnly: true
          minLength: 1
        new_password:
          type: string
          writeOnly: true
          minLength: 1
        new_password_confirm:
          type: string
          writeOnly: true
          minLength: 1
      required:
      - current_password
      - new_password
      - new_password_confirm
    Clarification:
      type: object
      description: Serializer for clarifications/Q&A.
      properties:
        id:
          type: integer
          readOnly: true
        contest:
          type: string
          format: uuid
          title: 考試
        problem:
          type: string
          format: uuid
