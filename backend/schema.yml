      description: |-
        GET /api/v1/ai/internal/problems/{id}/test-cases

        Returns ALL test cases (sample + hidden) for a problem.
      parameters:
      - in: path
        name: problem_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - v1
      security:
      - cookieJwtAuth: []
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/ai/models/:
    get:
      operationId: v1_ai_models_retrieve
      description: GET /api/v1/ai/models/ — return available model options.
      tags:
      - v1
      security:
      - cookieJwtAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
