        name: source_type
        schema:
          type: string
          title: 來源類型
          enum:
          - contest
          - practice
        description: |-
          * `practice` - Practice
          * `contest` - Contest
      - in: query
        name: status
        schema:
          type: string
          title: 狀態
          enum:
          - AC
          - CE
          - KR
          - MLE
          - RE
          - SE
          - TLE
          - WA
          - judging
          - pending
        description: |-
          * `pending` - Pending
          * `judging` - Judging
          * `AC` - Accepted
          * `WA` - Wrong Answer
          * `TLE` - Time Limit Exceeded
          * `MLE` - Memory Limit Exceeded
          * `RE` - Runtime Error
          * `CE` - Compilation Error
          * `KR` - Keyword Restriction
          * `SE` - System Error
