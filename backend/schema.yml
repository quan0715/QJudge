            application/json:
              schema:
                $ref: '#/components/schemas/AISession'
          description: ''
    put:
      operationId: v1_ai_sessions_update
      description: ViewSet for AI chat sessions.
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AISessionRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AISessionRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AISessionRequest'
      security:
      - cookieJwtAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AISession'
          description: ''
    patch:
      operationId: v1_ai_sessions_partial_update
      description: ViewSet for AI chat sessions.
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedAISessionRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedAISessionRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedAISessionRequest'
      security:
      - cookieJwtAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AISession'
          description: ''
    delete:
      operationId: v1_ai_sessions_destroy
      description: Delete a session (only authenticated users can delete their own
        sessions).
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - v1
      security:
      - cookieJwtAuth: []
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/ai/sessions/{id}/actions/{action_id}/cancel/:
