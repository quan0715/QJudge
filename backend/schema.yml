openapi: 3.0.3
info:
  title: Online Judge API
  version: 1.0.0
  description: API documentation for Online Judge Platform
paths:
  /api/oauth/approve/:
    post:
      operationId: oauth_approve_create
      description: |-
        Create authorization code and return redirect URL.

        Uses DRF authentication chain (CookieJWT / OAuth2 / JWT header).
      tags:
      - oauth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OAuthApproveRequestRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/OAuthApproveRequestRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/OAuthApproveRequestRequest'
        required: true
      security:
      - cookieJwtAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthApproveResponse'
          description: ''
  /api/v1/action-links:
    post:
      operationId: v1_action_links_create
      description: Issue a scoped action link for an explicit purpose.
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActionLinkIssueRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ActionLinkIssueRequest'
