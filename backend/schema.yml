      - cookieJwtAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActionLinkIssue'
          description: ''
  /api/v1/action-links/{token}:
    get:
      operationId: v1_action_links_retrieve
      description: Inspect an action link without redeeming it.
      parameters:
      - in: path
        name: token
        schema:
          type: string
        required: true
      tags:
      - v1
      security:
      - cookieJwtAuth: []
      - jwtAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/v1/action-links/{token}/redeem:
    post:
      operationId: v1_action_links_redeem_create
      description: Redeem a scoped action link.
      parameters:
      - in: path
