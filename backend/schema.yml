    get:
      operationId: v1_submissions_list
      description: ViewSet for viewing and creating submissions.
      parameters:
      - in: query
        name: contest
        schema:
          type: integer
      - in: query
        name: lab
        schema:
          type: integer
      - in: query
        name: language
        schema:
          type: string
          title: 語言
          enum:
          - c
          - cpp
          - java
          - python
        description: |-
          * `python` - Python 3.11
          * `cpp` - C++ 20
          * `c` - C 11
          * `java` - Java 17
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - in: query
        name: problem
        schema:
          type: integer
      - in: query
        name: source_type
        schema:
          type: string
          title: 來源類型
          enum:
          - contest
          - practice
        description: |-
          * `practice` - Practice
          * `contest` - Contest
      - in: query
        name: status
        schema:
          type: string
          title: 狀態
          enum:
          - AC
          - CE
          - KR
          - MLE
          - RE
          - SE
          - TLE
          - WA
          - judging
          - pending
        description: |-
          * `pending` - Pending
          * `judging` - Judging
          * `AC` - Accepted
          * `WA` - Wrong Answer
          * `TLE` - Time Limit Exceeded
          * `MLE` - Memory Limit Exceeded
          * `RE` - Runtime Error
          * `CE` - Compilation Error
          * `KR` - Keyword Restriction
          * `SE` - System Error
      - in: query
        name: user
        schema:
          type: integer
      tags:
      - v1
      security:
      - cookieJwtAuth: []
      - jwtAuth: []
      responses:
