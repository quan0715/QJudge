          description: ''
  /api/v1/ai/sessions/:
    get:
      operationId: v1_ai_sessions_list
      description: ViewSet for AI chat sessions.
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      tags:
      - v1
      security:
      - cookieJwtAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAISessionListList'
          description: ''
    post:
      operationId: v1_ai_sessions_create
      description: ViewSet for AI chat sessions.
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AISessionRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AISessionRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AISessionRequest'
      security:
      - cookieJwtAuth: []
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AISession'
          description: ''
  /api/v1/ai/sessions/{id}/:
    get:
      operationId: v1_ai_sessions_retrieve
      description: ViewSet for AI chat sessions.
      parameters:
      - in: path
        name: id
        schema:
