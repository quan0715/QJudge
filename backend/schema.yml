components:
  schemas:
    AIArtifact:
      type: object
      description: Metadata view of an artifact (no content).
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        session_id:
          type: string
          readOnly: true
        run_id:
          type: string
          nullable: true
          readOnly: true
        step:
          type: string
          readOnly: true
          description: SOP 階段識別（例：rubric、raw_answers、calibration、graded、final_delta）
        filename:
          type: string
          readOnly: true
        object_key:
          type: string
          readOnly: true
          description: Object storage 物件 key：ai-artifacts/{session_id}/{step}/{filename}
        content_type:
          type: string
          readOnly: true
        size_bytes:
          type: integer
          readOnly: true
        checksum:
          type: string
          readOnly: true
          description: 內容 sha256，用於完整性檢查
        metadata:
          readOnly: true
          description: 自由欄位：artifact_type、rubric 摘要、評分進度等
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - checksum
      - content_type
      - created_at
      - filename
      - id
      - metadata
      - object_key
      - run_id
      - session_id
      - size_bytes
      - step
      - updated_at
    AIChatRun:
      type: object
      description: Serializer for durable AI chat runs.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        session_id:
          type: string
          readOnly: true
        status:
          allOf:
          - $ref: '#/components/schemas/AIChatRunStatusEnum'
          readOnly: true
        kind:
          allOf:
          - $ref: '#/components/schemas/KindEnum'
          readOnly: true
        model_id:
          type: string
          readOnly: true
        thread_id:
          type: string
          readOnly: true
        external_run_id:
          type: string
          readOnly: true
        celery_task_id:
          type: string
          readOnly: true
        error:
          type: string
          readOnly: true
        approval_payload:
          readOnly: true
        question_payload:
          readOnly: true
        cancel_requested:
          type: boolean
          readOnly: true
        last_event_seq:
          type: integer
          readOnly: true
        user_message_id:
          type: integer
          readOnly: true
        assistant_message_id:
          type: integer
          readOnly: true
        started_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        completed_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - approval_payload
      - assistant_message_id
      - cancel_requested
      - celery_task_id
      - completed_at
      - created_at
      - error
      - external_run_id
      - id
      - kind
      - last_event_seq
      - model_id
      - question_payload
      - session_id
      - started_at
      - status
      - thread_id
      - updated_at
      - user_message_id
    AIChatRunStatusEnum:
      enum:
      - queued
      - running
      - awaiting_approval
      - awaiting_user_answer
      - completed
      - failed
      - cancelled
      type: string
      description: |-
        * `queued` - Queued
        * `running` - Running
        * `awaiting_approval` - Awaiting approval
        * `awaiting_user_answer` - Awaiting user answer
        * `completed` - Completed
        * `failed` - Failed
        * `cancelled` - Cancelled
    AIMessage:
      type: object
      description: Serializer for AI messages.
      properties:
        id:
          type: integer
          readOnly: true
        role:
          allOf:
          - $ref: '#/components/schemas/AIMessageRoleEnum'
          title: 角色
        content:
          type: string
          title: 訊息內容
        message_type:
          allOf:
          - $ref: '#/components/schemas/MessageTypeEnum'
          title: 訊息類型
        metadata:
          title: 元資料
          description: 存儲選項、預覽資料等額外資訊
        created_at:
          type: string
          format: date-time
          readOnly: true
          title: 創建時間
      required:
      - content
      - created_at
      - id
      - role
    AIMessageRequest:
      type: object
      description: Serializer for AI messages.
      properties:
        role:
          allOf:
          - $ref: '#/components/schemas/AIMessageRoleEnum'
          title: 角色
        content:
          type: string
          minLength: 1
          title: 訊息內容
        message_type:
          allOf:
          - $ref: '#/components/schemas/MessageTypeEnum'
          title: 訊息類型
        metadata:
          title: 元資料
          description: 存儲選項、預覽資料等額外資訊
      required:
      - content
      - role
    AIMessageRoleEnum:
      enum:
      - user
      - assistant
      - system
      type: string
      description: |-
        * `user` - 用戶
        * `assistant` - AI 助手
        * `system` - 系統
    AISession:
      type: object
      description: Serializer for AI sessions.
      properties:
        session_id:
          type: string
          readOnly: true
          title: Claude SDK Session ID
          description: 由 Claude Agent SDK 返回的唯一會話 ID
        user:
          type: integer
          readOnly: true
          title: 用戶
          description: 該會話所屬的用戶
        context:
          title: 上下文資料
          description: 存儲額外的會話元數據（如標題、自定義數據等）
        created_at:
          type: string
          format: date-time
          readOnly: true
          title: 創建時間
        updated_at:
          type: string
          format: date-time
          readOnly: true
          title: 更新時間
        messages:
          type: array
          items:
            $ref: '#/components/schemas/AIMessage'
          readOnly: true
        message_count:
          type: string
          readOnly: true
        title:
          type: string
          readOnly: true
      required:
      - created_at
      - message_count
      - messages
      - session_id
      - title
      - updated_at
      - user
    AISessionList:
      type: object
      description: Lightweight serializer for session list.
      properties:
        session_id:
