  /api/v1/ai/sessions/{id}/resume_stream/:
    post:
      operationId: v1_ai_sessions_resume_stream_create
      description: |-
        Resume an interrupted agent and stream the result.

        Proxies to ai-service /api/chat/resume endpoint.

        Request body:
        - decision: str (required) - "approve" or "reject"
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AISessionRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AISessionRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AISessionRequest'
      security:
      - cookieJwtAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AISession'
          description: ''
  /api/v1/ai/sessions/{id}/send_message_stream/:
    post:
      operationId: v1_ai_sessions_send_message_stream_create
      description: |-
        Send a message and stream AI response (proxied to ai-service).

        設計說明：
        - 所有 session 必須與認證用戶關聯
        - pk 可以是：
          - 現存 session_id（Claude SDK session ID）- 恢復現存會話
          - backend_session_id（新會話的 UUID）- 新會話（需要初始化）
          - 'new' 特殊值（向後相容）- 新會話
        - 不支持匿名會話

        Request body:
        - content: str (required) - The message content
        - skill: str (optional) - Skill to use for this message
        - model: str (optional) - Model to use: 'haiku', 'sonnet', 'opus' (default: 'haiku')
        - reference: object (optional) - Problem reference context
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AISessionRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AISessionRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AISessionRequest'
      security:
      - cookieJwtAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AISession'
          description: ''
  /api/v1/ai/sessions/{id}/submit_answer/:
    post:
      operationId: v1_ai_sessions_submit_answer_create
      description: |-
        Submit user's answer to a pending AskUserQuestion request.

        Request body:
        - request_id: str (required) - The request ID from the user_input_request event
        - answers: dict (required) - Mapping of question text to selected option label(s)

        This endpoint forwards the answer to the AI Service, which will resume
        the blocked chat_stream.
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AISessionRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AISessionRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AISessionRequest'
      security:
      - cookieJwtAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AISession'
          description: ''
  /api/v1/ai/sessions/new_session/:
    post:
      operationId: v1_ai_sessions_new_session_create
      description: |-
        Create a new session placeholder before first message.

        此 endpoint 用於前端建立新會話時獲取一個後端 session ID。
        實際的 AISession 會在發送第一條訊息時才建立。

        Returns:
            {
                "id": "backend-session-id",
                "status": "pending"
            }
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AISessionRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AISessionRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AISessionRequest'
      security:
      - cookieJwtAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AISession'
          description: ''
