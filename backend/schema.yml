openapi: 3.0.3
info:
  title: Online Judge API
  version: 1.0.0
  description: API documentation for Online Judge Platform
paths:
  /api/v1/ai/internal/pending-actions/{action_id}:
    get:
      operationId: v1_ai_internal_pending_actions_retrieve
      description: |-
        GET /api/v1/ai/internal/pending-actions/{action_id}

        Returns pending action details (for ai-service to build approval preview).
      parameters:
      - in: path
        name: action_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - v1
      security:
      - cookieJwtAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PendingAction'
          description: ''
  /api/v1/ai/internal/problem-actions/commit:
    post:
      operationId: v1_ai_internal_problem_actions_commit_create
      description: |-
        POST /api/v1/ai/internal/problem-actions/commit

        Called by ai-service tool after user confirms.
        Executes the actual create/patch with transaction safety.
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommitActionRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CommitActionRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CommitActionRequest'
        required: true
      security:
      - cookieJwtAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommitAction'
          description: ''
  /api/v1/ai/internal/problem-actions/prepare:
    post:
      operationId: v1_ai_internal_problem_actions_prepare_create
      description: |-
        POST /api/v1/ai/internal/problem-actions/prepare

        Called by ai-service tool: creates AIPendingAction with preview.
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PrepareActionRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PrepareActionRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PrepareActionRequest'
        required: true
      security:
      - cookieJwtAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrepareAction'
          description: ''
  /api/v1/ai/internal/problems/{problem_id}/context:
    get:
      operationId: v1_ai_internal_problems_context_retrieve
      description: |-
        GET /api/v1/ai/internal/problems/{id}/context

        Returns problem data for agent to read.
      parameters:
      - in: path
        name: problem_id
        schema:
          type: integer
        required: true
      tags:
      - v1
      security:
      - cookieJwtAuth: []
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/ai/models/:
    get:
      operationId: v1_ai_models_retrieve
      description: GET /api/v1/ai/models/ — return available model options.
      tags:
      - v1
      security:
      - cookieJwtAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelInfo'
          description: ''
  /api/v1/ai/sessions/:
    get:
      operationId: v1_ai_sessions_list
      description: ViewSet for AI chat sessions.
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      tags:
      - v1
      security:
      - cookieJwtAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAISessionListList'
          description: ''
    post:
      operationId: v1_ai_sessions_create
      description: ViewSet for AI chat sessions.
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AISessionRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AISessionRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AISessionRequest'
      security:
      - cookieJwtAuth: []
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AISession'
          description: ''
  /api/v1/ai/sessions/{id}/:
    get:
      operationId: v1_ai_sessions_retrieve
      description: ViewSet for AI chat sessions.
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - v1
      security:
      - cookieJwtAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AISession'
          description: ''
    put:
      operationId: v1_ai_sessions_update
      description: ViewSet for AI chat sessions.
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AISessionRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AISessionRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AISessionRequest'
      security:
      - cookieJwtAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AISession'
          description: ''
    patch:
      operationId: v1_ai_sessions_partial_update
      description: ViewSet for AI chat sessions.
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedAISessionRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedAISessionRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedAISessionRequest'
      security:
      - cookieJwtAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AISession'
          description: ''
    delete:
      operationId: v1_ai_sessions_destroy
      description: Delete a session (only authenticated users can delete their own
        sessions).
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - v1
      security:
      - cookieJwtAuth: []
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/ai/sessions/{id}/actions/{action_id}/cancel/:
    post:
      operationId: v1_ai_sessions_actions_cancel_create
      description: Cancel a pending action.
      parameters:
      - in: path
        name: action_id
        schema:
          type: string
        required: true
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AISessionRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AISessionRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AISessionRequest'
      security:
      - cookieJwtAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AISession'
          description: ''
  /api/v1/ai/sessions/{id}/actions/{action_id}/confirm/:
    post:
      operationId: v1_ai_sessions_actions_confirm_create
      description: Confirm a pending action. Commit happens on next prompt (v2.2 protocol).
      parameters:
      - in: path
        name: action_id
        schema:
          type: string
        required: true
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AISessionRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AISessionRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AISessionRequest'
      security:
      - cookieJwtAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AISession'
          description: ''
  /api/v1/ai/sessions/{id}/clear/:
    post:
      operationId: v1_ai_sessions_clear_create
      description: Clear all messages in a session.
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AISessionRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AISessionRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AISessionRequest'
      security:
      - cookieJwtAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AISession'
          description: ''
  /api/v1/ai/sessions/{id}/context/:
    get:
      operationId: v1_ai_sessions_context_retrieve
      description: Get session context (for debugging/inspection).
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - v1
      security:
      - cookieJwtAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AISession'
          description: ''
  /api/v1/ai/sessions/{id}/pending-actions/active/:
    get:
      operationId: v1_ai_sessions_pending_actions_active_retrieve
      description: Get active pending action for this session (for page refresh recovery).
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - v1
      security:
      - cookieJwtAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AISession'
          description: ''
  /api/v1/ai/sessions/{id}/rename/:
    post:
      operationId: v1_ai_sessions_rename_create
      description: Rename a session.
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AISessionRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AISessionRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AISessionRequest'
      security:
      - cookieJwtAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AISession'
          description: ''
  /api/v1/ai/sessions/{id}/resume_stream/:
    post:
      operationId: v1_ai_sessions_resume_stream_create
      description: |-
        Resume an interrupted agent and stream the result.

        Proxies to ai-service /api/chat/resume endpoint.

        Request body:
        - decision: str (required) - "approve" or "reject"
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AISessionRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AISessionRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AISessionRequest'
      security:
      - cookieJwtAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AISession'
          description: ''
  /api/v1/ai/sessions/{id}/send_message_stream/:
    post:
      operationId: v1_ai_sessions_send_message_stream_create
      description: |-
        Send a message and stream AI response (proxied to ai-service).

        設計說明：
        - 所有 session 必須與認證用戶關聯
        - pk 可以是：
          - 現存 session_id（Claude SDK session ID）- 恢復現存會話
          - backend_session_id（新會話的 UUID）- 新會話（需要初始化）
          - 'new' 特殊值（向後相容）- 新會話
        - 不支持匿名會話

        Request body:
        - content: str (required) - The message content
        - skill: str (optional) - Skill to use for this message
        - model: str (optional) - Model to use: 'haiku', 'sonnet', 'opus' (default: 'haiku')
        - reference: object (optional) - Problem reference context
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AISessionRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AISessionRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AISessionRequest'
      security:
      - cookieJwtAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AISession'
          description: ''
  /api/v1/ai/sessions/{id}/submit_answer/:
    post:
      operationId: v1_ai_sessions_submit_answer_create
      description: |-
        Submit user's answer to a pending AskUserQuestion request.

        Request body:
        - request_id: str (required) - The request ID from the user_input_request event
        - answers: dict (required) - Mapping of question text to selected option label(s)

        This endpoint forwards the answer to the AI Service, which will resume
        the blocked chat_stream.
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AISessionRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AISessionRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AISessionRequest'
      security:
      - cookieJwtAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AISession'
          description: ''
  /api/v1/ai/sessions/new_session/:
    post:
      operationId: v1_ai_sessions_new_session_create
      description: |-
        Create a new session placeholder before first message.

        此 endpoint 用於前端建立新會話時獲取一個後端 session ID。
        實際的 AISession 會在發送第一條訊息時才建立。

        Returns:
            {
                "id": "backend-session-id",
                "status": "pending"
            }
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AISessionRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AISessionRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AISessionRequest'
      security:
      - cookieJwtAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AISession'
          description: ''
  /api/v1/auth/{id}/role:
    patch:
      operationId: v1_auth_role_partial_update
      description: |-
        Update user role (admin only).

        PATCH /api/v1/users/{id}/role
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedUserRoleUpdateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedUserRoleUpdateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedUserRoleUpdateRequest'
      security:
      - cookieJwtAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserRoleUpdate'
          description: ''
  /api/v1/auth/change-password:
    post:
      operationId: v1_auth_change_password_create
      description: |-
        Change password for current user.

        POST /api/v1/auth/change-password

        Requires current password verification.
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
        required: true
      security:
      - cookieJwtAuth: []
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/auth/dev/token:
    post:
      operationId: v1_auth_dev_token_create
      description: |-
        Development-only helper to generate JWT tokens for a test user.

        POST /api/v1/auth/dev/token
        Body: { role: "student"|"teacher"|"admin", email?, username?, password? }
      tags:
      - v1
      security:
      - cookieJwtAuth: []
      - jwtAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/v1/auth/email/login:
    post:
      operationId: v1_auth_email_login_create
      description: |-
        User login with email/password.
        Rate limited to 10 requests per minute per IP.

        POST /api/v1/auth/email/login

        Response includes:
        - JWT tokens in HttpOnly cookies (access_token, refresh_token)
        - CSRF token in a readable cookie (csrftoken) for subsequent requests
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/LoginRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/LoginRequest'
        required: true
      security:
      - cookieJwtAuth: []
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Login'
          description: ''
  /api/v1/auth/email/register:
    post:
      operationId: v1_auth_email_register_create
      description: |-
        User registration with email/password.
        Rate limited to 5 requests per minute per IP.

        POST /api/v1/auth/email/register
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
        required: true
      security:
      - cookieJwtAuth: []
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Register'
          description: ''
  /api/v1/auth/logout:
    post:
      operationId: v1_auth_logout_create
      description: |-
        Logout user by blacklisting their refresh token and clearing cookies.
        This invalidates both access and refresh tokens.

        POST /api/v1/auth/logout
      tags:
      - v1
      security:
      - cookieJwtAuth: []
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/auth/me:
    get:
      operationId: v1_auth_me_retrieve
      description: |-
        Get current authenticated user information.

        GET /api/v1/users/me
      tags:
      - v1
      security:
      - cookieJwtAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
    patch:
      operationId: v1_auth_me_partial_update
      description: Update current user profile.
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedUserRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedUserRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedUserRequest'
      security:
      - cookieJwtAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
  /api/v1/auth/me/api-key:
    get:
      operationId: v1_auth_me_api_key_retrieve
      description: Get API key status (without exposing the actual key).
      tags:
      - v1
      security:
      - cookieJwtAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SetAPIKey'
          description: ''
    post:
      operationId: v1_auth_me_api_key_create
      description: Set/update API key.
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetAPIKeyRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/SetAPIKeyRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/SetAPIKeyRequest'
        required: true
      security:
      - cookieJwtAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SetAPIKey'
          description: ''
    delete:
      operationId: v1_auth_me_api_key_destroy
      description: Delete API key.
      tags:
      - v1
      security:
      - cookieJwtAuth: []
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/auth/me/api-key/usage:
    get:
      operationId: v1_auth_me_api_key_usage_retrieve
      description: Get usage statistics.
      tags:
      - v1
      security:
      - cookieJwtAuth: []
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/auth/me/api-key/validate:
    post:
      operationId: v1_auth_me_api_key_validate_create
      description: Validate API key.
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ValidateAPIKeyRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ValidateAPIKeyRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ValidateAPIKeyRequest'
