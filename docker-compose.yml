services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: oj_postgres
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-online_judge}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - oj_network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-online_judge}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for Celery
  redis:
    image: redis:7-alpine
    container_name: oj_redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - oj_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # AI Service (LangChain DeepAgent)
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: oj_ai_service
    restart: always
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - AI_STATE_POSTGRES_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-online_judge}
      - BACKEND_INTERNAL_URL=http://backend:8000/api/v1/ai
      - AI_SERVICE_ID=${AI_SERVICE_ID:-ai-service-01}
      - HMAC_SECRET=${HMAC_SECRET}
      - AI_INTERNAL_TOKEN=${AI_SERVICE_INTERNAL_TOKEN}
      - DEFAULT_MODEL_ID=${DEFAULT_MODEL_ID:-claude-sonnet}
    volumes:
      - ./ai-service:/app
    networks:
      - oj_network
    depends_on:
      - postgres
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Django Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        DJANGO_ENV: production
    container_name: oj_backend
    restart: always
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             daphne -b 0.0.0.0 -p 8000 config.asgi:application"
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.prod
      - AI_SERVICE_URL=http://ai-service:8001
      - HMAC_SECRET=${HMAC_SECRET}
      - AI_SERVICE_INTERNAL_TOKEN=${AI_SERVICE_INTERNAL_TOKEN}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    networks:
      - oj_network

  # Celery Worker - High Priority (Contest submissions)
  celery-high:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: oj_celery_high
    restart: always
    command: celery -A config worker -l info -Q high_priority,default --concurrency=2
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - judge_tmp:/judge_tmp
    env_file:
      - .env
    environment:
      - JUDGE_TMP_DIR=/judge_tmp
      - DJANGO_SETTINGS_MODULE=config.settings.prod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    networks:
      - oj_network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G

  # Celery Worker - Default (Practice submissions)
  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: oj_celery
    restart: always
    command: celery -A config worker -l info -Q default --concurrency=2
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - judge_tmp:/judge_tmp
    env_file:
      - .env
    environment:
      - JUDGE_TMP_DIR=/judge_tmp
      - DJANGO_SETTINGS_MODULE=config.settings.prod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    networks:
      - oj_network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G

  # Celery Beat (Scheduler for periodic tasks)
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: oj_celery_beat
    restart: always
    command: celery -A config beat -l info
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.prod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - oj_network

  # Frontend (React + Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: oj_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - oj_network

  # Cloudflared Tunnel
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: oj_cloudflared
    restart: always
    command: tunnel --no-autoupdate run --token ${TUNNEL_TOKEN}
    networks:
      - oj_network

  # Judge Environment Image
  # This service is only for building the image used by Celery workers.
  # It exits immediately after starting.
  judge-image:
    build:
      context: ./backend/judge
      dockerfile: Dockerfile.judge
    image: oj-judge:latest
    container_name: oj_judge_image
    command: ["true"]
    restart: "no"
    networks:
      - oj_network

volumes:
  postgres_data:
  static_volume:
  media_volume:
  judge_tmp:

networks:
  oj_network:
    driver: bridge
