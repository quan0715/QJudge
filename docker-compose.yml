services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: oj_postgres
    restart: always
    # Raise max_connections so pgBouncer's server pool never hits the hard cap.
    # With pool_size=30 pgBouncer never needs more than ~50 server connections;
    # 200 gives headroom for migrations, admin tools, and monitoring.
    command: postgres -c max_connections=200 -c shared_buffers=256MB -c work_mem=4MB
    environment:
      POSTGRES_DB: ${DB_NAME:-online_judge}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - oj_network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-online_judge}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  # PgBouncer – connection pooler in front of Postgres.
  # Session mode: fully compatible with SELECT FOR UPDATE and transaction.atomic.
  # With CONN_MAX_AGE=0 in Django, each request borrows a server connection from
  # this pool and returns it immediately after the response, so Postgres never
  # accumulates idle connections from idle Django threads.
  pgbouncer:
    image: edoburu/pgbouncer:v1.24.1-p1
    container_name: oj_pgbouncer
    restart: always
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-online_judge}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      # Use plaintext auth inside Docker network so PgBouncer can authenticate
      # against Postgres even when server-side password hashing is SCRAM.
      AUTH_TYPE: plain
      POOL_MODE: session
      # Accept up to 500 simultaneous client connections (Django threads + Celery).
      MAX_CLIENT_CONN: "500"
      # Keep at most 50 real server connections to Postgres per database/user pair.
      DEFAULT_POOL_SIZE: "50"
      RESERVE_POOL_SIZE: "20"
      RESERVE_POOL_TIMEOUT: "3"
      MAX_DB_CONNECTIONS: "150"
      QUERY_WAIT_TIMEOUT: "120"
      # Release idle server connections after 10 minutes.
      SERVER_IDLE_TIMEOUT: "600"
      # Never forcibly disconnect idle clients (Django manages its own lifecycle).
      CLIENT_IDLE_TIMEOUT: "0"
      SERVER_RESET_QUERY: "DISCARD ALL"
      LOG_CONNECTIONS: "0"
      LOG_DISCONNECTIONS: "0"
      LOG_STATS: "0"
    ports:
      - "6432:5432"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - oj_network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -h localhost -p 5432 -U ${DB_USER:-postgres}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for Celery
  redis:
    image: redis:7-alpine
    container_name: oj_redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - oj_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: oj_minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_API_CORS_ALLOW_ORIGIN: ${MINIO_API_CORS_ALLOW_ORIGIN:-https://q-judge-dev.quan.wtf}
      MINIO_PROMETHEUS_AUTH_TYPE: ${MINIO_PROMETHEUS_AUTH_TYPE:-public}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - oj_network

  # AI Service (LangChain DeepAgent)
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: oj_ai_service
    restart: always
    command: uvicorn main:app --host 0.0.0.0 --port 8001 --workers 2 --timeout-keep-alive 30
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      - AI_STATE_POSTGRES_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@pgbouncer:5432/${DB_NAME:-online_judge}
      - AI_INTERNAL_TOKEN=${AI_SERVICE_INTERNAL_TOKEN}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - ./ai-service:/app
    networks:
      - oj_network
    depends_on:
      pgbouncer:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "--max-time", "8", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Django Backend (shared image with all Celery services — single build per compose up --build)
  backend:
    build: &backend_prod_build
      context: ./backend
      dockerfile: Dockerfile
      args:
        DJANGO_ENV: production
    image: oj-backend:prod
    container_name: oj_backend
    restart: always
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             daphne -b 0.0.0.0 -p 8000 config.asgi:application"
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
      - /var/run/docker.sock:/var/run/docker.sock
      - judge_tmp:/judge_tmp
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.prod
      # Route all Django DB traffic through pgBouncer (overrides .env DB_HOST/PORT).
      - DB_HOST=pgbouncer
      - DB_PORT=5432
      - AI_SERVICE_URL=http://ai-service:8001
      - AI_SERVICE_INTERNAL_TOKEN=${AI_SERVICE_INTERNAL_TOKEN}
      - FRONTEND_URL=${FRONTEND_URL:-https://q-judge.com}
      - JUDGE_TMP_DIR=/judge_tmp
      - ANTICHEAT_S3_ENDPOINT_URL=${ANTICHEAT_S3_ENDPOINT_URL:-http://minio:9000}
      - ANTICHEAT_S3_PUBLIC_ENDPOINT_URL=${ANTICHEAT_S3_PUBLIC_ENDPOINT_URL:-}
      - ANTICHEAT_S3_REGION=${ANTICHEAT_S3_REGION:-us-east-1}
      - ANTICHEAT_S3_ACCESS_KEY=${ANTICHEAT_S3_ACCESS_KEY:-minioadmin}
      - ANTICHEAT_S3_SECRET_KEY=${ANTICHEAT_S3_SECRET_KEY:-minioadmin}
      - ANTICHEAT_RAW_BUCKET=${ANTICHEAT_RAW_BUCKET:-anticheat-raw}
      - ANTICHEAT_PRESIGNED_URL_TTL_SECONDS=${ANTICHEAT_PRESIGNED_URL_TTL_SECONDS:-300}
      - MARKDOWN_IMAGE_S3_BUCKET=${MARKDOWN_IMAGE_S3_BUCKET:-markdown-images}
      - MARKDOWN_IMAGE_MAX_BYTES=${MARKDOWN_IMAGE_MAX_BYTES:-5242880}
      - MARKDOWN_IMAGE_PUBLIC_BASE_URL=${MARKDOWN_IMAGE_PUBLIC_BASE_URL:-}
    depends_on:
      postgres:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    networks:
      - oj_network
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "--max-time", "4", "http://localhost:8000/api/health/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # Celery Worker - High Priority (Contest submissions)
  celery-high:
    build: *backend_prod_build
    image: oj-backend:prod
    container_name: oj_celery_high
    restart: always
    command: celery -A config worker -l info -Q high_priority,default --concurrency=2
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - judge_tmp:/judge_tmp
    env_file:
      - .env
    environment:
      - JUDGE_TMP_DIR=/judge_tmp
      - DJANGO_SETTINGS_MODULE=config.settings.prod
      - DB_HOST=pgbouncer
      - DB_PORT=5432
      - ANTICHEAT_S3_ENDPOINT_URL=${ANTICHEAT_S3_ENDPOINT_URL:-http://minio:9000}
      - ANTICHEAT_S3_REGION=${ANTICHEAT_S3_REGION:-us-east-1}
      - ANTICHEAT_S3_ACCESS_KEY=${ANTICHEAT_S3_ACCESS_KEY:-minioadmin}
      - ANTICHEAT_S3_SECRET_KEY=${ANTICHEAT_S3_SECRET_KEY:-minioadmin}
      - ANTICHEAT_RAW_BUCKET=${ANTICHEAT_RAW_BUCKET:-anticheat-raw}
    depends_on:
      postgres:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    networks:
      - oj_network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G

  # Celery Worker - Default (Practice submissions)
  celery:
    build: *backend_prod_build
    image: oj-backend:prod
    container_name: oj_celery
    restart: always
    command: celery -A config worker -l info -Q default --concurrency=2
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - judge_tmp:/judge_tmp
    env_file:
      - .env
    environment:
      - JUDGE_TMP_DIR=/judge_tmp
      - DJANGO_SETTINGS_MODULE=config.settings.prod
      - DB_HOST=pgbouncer
      - DB_PORT=5432
      - ANTICHEAT_S3_ENDPOINT_URL=${ANTICHEAT_S3_ENDPOINT_URL:-http://minio:9000}
      - ANTICHEAT_S3_REGION=${ANTICHEAT_S3_REGION:-us-east-1}
      - ANTICHEAT_S3_ACCESS_KEY=${ANTICHEAT_S3_ACCESS_KEY:-minioadmin}
      - ANTICHEAT_S3_SECRET_KEY=${ANTICHEAT_S3_SECRET_KEY:-minioadmin}
      - ANTICHEAT_RAW_BUCKET=${ANTICHEAT_RAW_BUCKET:-anticheat-raw}
    depends_on:
      postgres:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    networks:
      - oj_network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G

  # Celery Beat (Scheduler for periodic tasks)
  celery-beat:
    build: *backend_prod_build
    image: oj-backend:prod
    container_name: oj_celery_beat
    restart: always
    command: celery -A config beat -l info
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.prod
      - DB_HOST=pgbouncer
      - DB_PORT=5432
    depends_on:
      postgres:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - oj_network

  # MCP Server (OAuth 2.1 + tool proxy)
  qjudge-mcp:
    build:
      context: ./mcp-server
    container_name: oj_mcp
    environment:
      - DJANGO_BASE_URL=http://backend:8000
      - MCP_PUBLIC_URL=${MCP_PUBLIC_URL:-https://mcp.q-judge.com}
      - OAUTH_ISSUER_URL=${FRONTEND_URL:-https://q-judge.com}
    depends_on:
      - backend
    networks:
      - oj_network
    restart: unless-stopped

  # Frontend (React + Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        RECUR_PUBLISHABLE_KEY: ${RECUR_PUBLISHABLE_KEY:-}
    container_name: oj_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - oj_network

  # Cloudflared Tunnel
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: oj_cloudflared
    restart: always
    command: tunnel --no-autoupdate run --token ${TUNNEL_TOKEN}
    networks:
      - oj_network

  # GlitchTip Error Tracking
  glitchtip:
    image: glitchtip/glitchtip:latest
    container_name: oj_glitchtip
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/glitchtip
      SECRET_KEY: ${GLITCHTIP_SECRET_KEY:-change-me-in-production}
      REDIS_URL: redis://redis:6379/1
      DEFAULT_FROM_EMAIL: ${GLITCHTIP_FROM_EMAIL:-noreply@qjudge.local}
      GLITCHTIP_DOMAIN: ${GLITCHTIP_DOMAIN:-http://localhost:8080}
      ENABLE_ORGANIZATION_CREATION: "true"
    ports:
      - "8080:8000"
    networks:
      - oj_network

  glitchtip-worker:
    image: glitchtip/glitchtip:latest
    container_name: oj_glitchtip_worker
    restart: always
    command: ./bin/run-celery-with-beat.sh
    depends_on:
      - glitchtip
    environment:
      DATABASE_URL: postgres://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/glitchtip
      SECRET_KEY: ${GLITCHTIP_SECRET_KEY:-change-me-in-production}
      REDIS_URL: redis://redis:6379/1
    networks:
      - oj_network

  # Judge Environment Image
  # Image is pre-pulled from GHCR by deploy-prod.sh (oj-judge:latest).
  # This service just ensures the image is present before celery workers start.
  judge-image:
    image: oj-judge:latest
    container_name: oj_judge_image
    command: ["true"]
    restart: "no"
    networks:
      - oj_network

volumes:
  postgres_data:
  static_volume:
  media_volume:
  judge_tmp:
  minio_data:

networks:
  oj_network:
    driver: bridge
